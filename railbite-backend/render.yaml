services:
  - type: web
    name: railbite-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel frontend URL
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASSWORD
        sync: false
      - key: SSLCOMMERZ_SANDBOX
        value: "true"
      # ── Email (pick ONE option) ──
      # Option 1: Gmail App Password (easiest)
      - key: GMAIL_USER
        sync: false  # e.g. yourname@gmail.com
      - key: GMAIL_APP_PASSWORD
        sync: false  # 16-char app password from Google
      # Option 2: Custom SMTP (SendGrid, Mailgun, etc.)
      # - key: SMTP_HOST
      #   sync: false
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_SECURE
      #   value: "false"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      - key: EMAIL_FROM
        value: '"RailBite Bangladesh" <noreply@railbitebd.com>'
