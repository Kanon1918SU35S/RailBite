services:
  - type: web
    name: railbite-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel frontend URL
      - key: SSLCOMMERZ_STORE_ID
        sync: false
      - key: SSLCOMMERZ_STORE_PASSWORD
        sync: false
      - key: SSLCOMMERZ_SANDBOX
        value: "true"
      # ── Email Provider (Brevo recommended — SMTP is blocked on Render) ──
      # Option 1: Brevo HTTP API (FREE 300 emails/day, works on Render)
      - key: BREVO_API_KEY
        sync: false  # Get from https://app.brevo.com/settings/keys/api
      - key: BREVO_SENDER_EMAIL
        sync: false  # Your verified sender email in Brevo
      # Option 2: Resend HTTP API (FREE 100 emails/day)
      # - key: RESEND_API_KEY
      #   sync: false
      # Option 3: Gmail SMTP (⚠️ BLOCKED on Render free tier)
      # - key: GMAIL_USER
      #   sync: false
      # - key: GMAIL_APP_PASSWORD
      #   sync: false
